<!DOCTYPE html>
<html>
<head>
    <title>Revision Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2>🔁 Revision Plan</h2>
{% if revision_list %}
    <ul class="list-group mt-3">
        {% for sub in revision_list %}
            <li class="list-group-item">{{ sub }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p class="text-success mt-3">No revision needed 🎉</p>
{% endif %}
<a href="/dashboard" class="btn btn-dark mt-3">← Back</a>
</body>
</html>
