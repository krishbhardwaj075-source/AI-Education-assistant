<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-bg">
    <div class="auth-card">
        <h2>Signup</h2>
    <form method="POST">
        <input type="text" name="name" placeholder="Name" class="form-control mb-3" required>
        <input type="email" name="email" placeholder="Email" class="form-control mb-3" required> 
        <input type="text" name="username" placeholder="Username" class="form-control mb-3" required>
        <input type="password" name="password" placeholder="Password" class="form-control mb-3" maxlength="8" required>
        <button class="btn btn-success">Signup</button>
    </form>
    <p class="mt-3">Already have account?
    <a href="/login">  Login</a></p>
    </div>
</body>
</html>
