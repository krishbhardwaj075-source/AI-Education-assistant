<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add subjecta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-bg">
<div class="auth-card">
    <a href="/dashboard" class="btn btn-light mb-3">Back to Dashboard</a>
    <h2>Add Subjects</h2>
    <form method="POST">
        <input type="text" name="subject" placeholder="Subject Name" class="form-control mb-3">
        <select name="difficulty"  class="form-control mb-3">
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
        </select>
        <input type="text" name="topics" placeholder="Topics" class="form-control mb-3">
        <input type="date" name="exam_date" class="from-control mb-3">
        <button class="btn btn-success w-100">Add</button>
    </form>
</div>
</body>
</html>
