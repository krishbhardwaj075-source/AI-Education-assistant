<!DOCTYPE html>
<html>
<head>
<title>AI Assistant</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container mt-5">
<h2>AI Study Assistant 🤖</h2>
<form action="/chatbot" method="POST">
<input type="text" name="message" class="form-control mb-3" placeholder="Ask anything..." required>
<button class="btn btn-primary">Ask</button>
</form>
{% if response %}
<div class="card p-3 mt-4">
<h5>AI Response:</h5>
<p>{{ response }}</p>
</div>
{% endif %}
<a href="/dashboard" class="btn btn-light mt-3">⬅ Back</a>
</div>
</body>
</html>
